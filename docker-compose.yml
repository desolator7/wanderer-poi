x-common-env: &cenv
  MEILI_URL: http://search:7700
  MEILI_MASTER_KEY: 646275a4-453f-4c3c-9957-93641053630e
  ORIGIN: https://wanderer.dschaub.de

services:
  search:
    container_name: wanderer-search
    image: getmeili/meilisearch:v1.11.3
    environment:
      <<: *cenv
      MEILI_NO_ANALYTICS: true
    ports:
      - 7700:7700
    networks:
      - wanderer
    volumes:
      - /docker/appdata/wanderer/data.ms:/meili_data/data.ms
    restart: unless-stopped
    healthcheck:
      test: curl --fail http://localhost:7700/health || exit 1
      interval: 15s
      retries: 10
      start_period: 20s
      timeout: 10s
  db:
    container_name: wanderer-db
    image: wanderer-db:main
    build:
      context: /docker/appdata/wanderer-poi/db
    depends_on:
      search:
        condition: service_healthy
    environment:
      <<: *cenv
      POCKETBASE_ENCRYPTION_KEY: 1922303f17fa6ec5296631cda606779c
      POCKETBASE_CRON_SYNC_SCHEDULE: 00 14 * * *
    ports:
      - "8090:8090"
    networks:
      - wanderer
    restart: unless-stopped
    volumes:
      - /docker/appdata/wanderer/pb_data:/pb_data
  web:
    container_name: wanderer-web
    image: wanderer-web:main
    build:
      context: /docker/appdata/wanderer-poi/web

    depends_on:
      search:
        condition: service_healthy
      db:
        condition: service_started
      valhalla:
        condition: service_started
    environment:
      <<: *cenv
      BODY_SIZE_LIMIT: Infinity
      PUBLIC_POCKETBASE_URL: http://db:8090
      PUBLIC_DISABLE_SIGNUP: false
      UPLOAD_FOLDER: /app/uploads
      UPLOAD_USER:
      UPLOAD_PASSWORD:
      PUBLIC_VALHALLA_URL: http://valhalla:8002
      PUBLIC_NOMINATIM_URL: https://nominatim.openstreetmap.org
    volumes:
      - /docker/appdata/wanderer/uploads:/app/uploads
    ports:
      - "3000:3000"
    networks:
      - wanderer
    restart: unless-stopped
  valhalla:
    container_name: wanderer-valhalla
    image: ghcr.io/valhalla/valhalla-scripted:latest
    ports:
      - "8002:8002"
    volumes:
      - /docker/appdata/wanderer/valhalla:/custom_files
    environment:
      - tile_urls=https://download.geofabrik.de/europe/germany/sachsen-anhalt-latest.osm.pbf
      - use_tiles_ignore_pbf=True
      - force_rebuild=False
      - build_elevation=True
      - build_admins=True
      - build_time_zones=True
    networks:
      - wanderer
    restart: unless-stopped

networks:
  wanderer:
    driver: bridge
